<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" font-family="Inter, -apple-system, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowGreen2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#22c55e"/>
    </marker>
  </defs>

  <rect width="900" height="720" fill="url(#bg2)" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">Release Workflow</text>
  <text x="450" y="58" text-anchor="middle" fill="#94a3b8" font-size="12">CI/CD Pipeline for Both Editions</text>

  <!-- ===== MAIN FLOW (left) ===== -->
  <text x="225" y="90" text-anchor="middle" fill="#818cf8" font-size="15" font-weight="700">Full Edition (main)</text>

  <!-- Step 1: PR -->
  <rect x="100" y="105" width="250" height="40" rx="8" fill="#1e1e32" stroke="#6366f1" stroke-width="1.5"/>
  <text x="135" y="121" fill="#94a3b8" font-size="10">STEP 1</text>
  <text x="135" y="136" fill="#e2e8f0" font-size="12" font-weight="600">PR to main (feat/fix/...)</text>

  <line x1="225" y1="145" x2="225" y2="161" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Review -->
  <rect x="100" y="165" width="250" height="40" rx="8" fill="#1e1e32" stroke="#6366f1" stroke-width="1.5"/>
  <text x="135" y="181" fill="#94a3b8" font-size="10">STEP 2</text>
  <text x="135" y="196" fill="#e2e8f0" font-size="12" font-weight="600">CI + claude[bot] review + merge</text>

  <line x1="225" y1="205" x2="225" y2="221" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Semantic Release -->
  <rect x="100" y="225" width="250" height="40" rx="8" fill="#1e1e32" stroke="#6366f1" stroke-width="1.5"/>
  <text x="135" y="241" fill="#94a3b8" font-size="10">STEP 3</text>
  <text x="135" y="256" fill="#e2e8f0" font-size="12" font-weight="600">semantic-release creates vX.Y.Z</text>

  <line x1="225" y1="265" x2="225" y2="281" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4: Build -->
  <rect x="100" y="285" width="250" height="40" rx="8" fill="#1e1e32" stroke="#6366f1" stroke-width="1.5"/>
  <text x="135" y="301" fill="#94a3b8" font-size="10">STEP 4</text>
  <text x="135" y="316" fill="#e2e8f0" font-size="12" font-weight="600">Tauri build + upload installer</text>

  <line x1="225" y1="325" x2="225" y2="341" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 5: Gist Update -->
  <rect x="100" y="345" width="250" height="40" rx="8" fill="#1e1e32" stroke="#22c55e" stroke-width="1.5"/>
  <text x="135" y="361" fill="#94a3b8" font-size="10">STEP 5</text>
  <text x="135" y="376" fill="#e2e8f0" font-size="12" font-weight="600">Update Gist → stable.json</text>

  <line x1="225" y1="385" x2="225" y2="401" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Result -->
  <rect x="100" y="405" width="250" height="50" rx="10" fill="#6366f1" opacity="0.15" stroke="#6366f1" stroke-width="1.5"/>
  <text x="225" y="428" text-anchor="middle" fill="#a5b4fc" font-size="13" font-weight="700">GitHub Release vX.Y.Z</text>
  <text x="225" y="446" text-anchor="middle" fill="#94a3b8" font-size="11">Full-featured installer</text>

  <!-- ===== NEXUS FLOW (right) ===== -->
  <text x="675" y="90" text-anchor="middle" fill="#fbbf24" font-size="15" font-weight="700">Nexus Edition (nexus-compliant)</text>

  <!-- Step 1: Sync -->
  <rect x="550" y="105" width="250" height="40" rx="8" fill="#1e1e32" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="585" y="121" fill="#94a3b8" font-size="10">STEP 1</text>
  <text x="585" y="136" fill="#e2e8f0" font-size="12" font-weight="600">git merge main (sync features)</text>

  <line x1="675" y1="145" x2="675" y2="161" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Resolve -->
  <rect x="550" y="165" width="250" height="40" rx="8" fill="#1e1e32" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="585" y="181" fill="#94a3b8" font-size="10">STEP 2</text>
  <text x="585" y="196" fill="#e2e8f0" font-size="12" font-weight="600">Resolve conflicts (if any) + push</text>

  <line x1="675" y1="205" x2="675" y2="221" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Semantic Release -->
  <rect x="550" y="225" width="250" height="40" rx="8" fill="#1e1e32" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="585" y="241" fill="#94a3b8" font-size="10">STEP 3</text>
  <text x="585" y="256" fill="#e2e8f0" font-size="12" font-weight="600">semantic-release creates vX.Y.Z-nexus.N</text>

  <line x1="675" y1="265" x2="675" y2="281" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4: Build -->
  <rect x="550" y="285" width="250" height="40" rx="8" fill="#1e1e32" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="585" y="301" fill="#94a3b8" font-size="10">STEP 4</text>
  <text x="585" y="316" fill="#e2e8f0" font-size="12" font-weight="600">Tauri build + upload installer</text>

  <line x1="675" y1="325" x2="675" y2="341" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 5: Gist Update -->
  <rect x="550" y="345" width="250" height="40" rx="8" fill="#1e1e32" stroke="#22c55e" stroke-width="1.5"/>
  <text x="585" y="361" fill="#94a3b8" font-size="10">STEP 5</text>
  <text x="585" y="376" fill="#e2e8f0" font-size="12" font-weight="600">Update Gist → nexus.json</text>

  <line x1="675" y1="385" x2="675" y2="401" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Result -->
  <rect x="550" y="405" width="250" height="50" rx="10" fill="#f59e0b" opacity="0.12" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="675" y="428" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="700">GitHub Release vX.Y.Z-nexus.N</text>
  <text x="675" y="446" text-anchor="middle" fill="#94a3b8" font-size="11">Nexus-compliant installer</text>

  <!-- Cross arrow: main triggers sync -->
  <path d="M350,305 C420,305 480,125 550,125" stroke="#22c55e" stroke-width="1.5" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowGreen2)"/>
  <text x="435" y="210" fill="#22c55e" font-size="10" font-weight="600" transform="rotate(-30,435,210)">triggers sync</text>

  <!-- Divider -->
  <line x1="450" y1="80" x2="450" y2="460" stroke="#2d2d44" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ===== GIST BOX (center bottom) ===== -->
  <rect x="250" y="475" width="400" height="80" rx="10" fill="#1e1e32" stroke="#22c55e" stroke-width="1.5"/>
  <text x="450" y="498" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="700">GitHub Gist — Auto-Updater Endpoints</text>
  <text x="450" y="518" text-anchor="middle" fill="#94a3b8" font-size="11">stable.json ← Full edition checks for updates</text>
  <text x="450" y="536" text-anchor="middle" fill="#94a3b8" font-size="11">nexus.json ← Nexus edition checks for updates</text>

  <!-- Arrows from Step 5 boxes to Gist -->
  <path d="M225,385 C225,430 350,490 250,490" stroke="#22c55e" stroke-width="1.2" fill="none" stroke-dasharray="4,3"/>
  <path d="M675,385 C675,430 550,490 650,490" stroke="#22c55e" stroke-width="1.2" fill="none" stroke-dasharray="4,3"/>

  <!-- Bottom info boxes -->
  <rect x="40" y="575" width="390" height="130" rx="10" fill="#1e1e32" stroke="#6366f1" stroke-width="1" opacity="0.8"/>
  <text x="60" y="600" fill="#818cf8" font-size="12" font-weight="700">Full Edition Features</text>
  <text x="60" y="620" fill="#94a3b8" font-size="11">Mod detail modal (description, changelogs, files)</text>
  <text x="60" y="638" fill="#94a3b8" font-size="11">Trending mods grid + dashboard activity</text>
  <text x="60" y="656" fill="#94a3b8" font-size="11">Nexus search, images, summaries, stats on cards</text>
  <text x="60" y="674" fill="#94a3b8" font-size="11">BBCode renderer, file contents preview</text>
  <text x="60" y="692" fill="#94a3b8" font-size="11">In-app file selection for multi-file mods</text>

  <rect x="470" y="575" width="390" height="130" rx="10" fill="#1e1e32" stroke="#f59e0b" stroke-width="1" opacity="0.8"/>
  <text x="490" y="600" fill="#fbbf24" font-size="12" font-weight="700">Nexus Edition Differences</text>
  <text x="490" y="620" fill="#94a3b8" font-size="11">Slim modal (name, requirements, "View on Nexus" CTA)</text>
  <text x="490" y="638" fill="#94a3b8" font-size="11">No trending, no community activity section</text>
  <text x="490" y="656" fill="#94a3b8" font-size="11">Cards without images/summaries/stats</text>
  <text x="490" y="674" fill="#94a3b8" font-size="11">All clicks redirect to nexusmods.com</text>
  <text x="490" y="692" fill="#94a3b8" font-size="11">File selection redirects to Nexus files tab</text>
</svg>
